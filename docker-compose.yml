services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: fuel-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-fuel.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fuel-net

  nginx:
    image: nginx:1.29-alpine
    container_name: fuel-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro  # ← ЭТО ПРАВИЛЬНО
    depends_on:
      - app
    networks:
      - fuel-net

  postgres:
    image: postgres:17-alpine
    container_name: fuel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-fuel_points}
      POSTGRES_USER: ${DB_USERNAME:-fuel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: Europe/Moscow
    ports:
      - "5433:5432"
    volumes:
      - fuel-pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-fuel} -d ${DB_DATABASE:-fuel_points}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fuel-net

  redis:
    image: redis:7-alpine
    container_name: fuel-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6380:6379"
    volumes:
      - fuel-redis-data:/data
    networks:
      - fuel-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: fuel-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--tries=3", "--backoff=5", "--max-time=3600"]
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-fuel.ini:ro
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - fuel-net

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: fuel-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: [ "php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080" ]
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-fuel.ini:ro
    ports:
      - "8081:8080"
    depends_on:
      - app
    networks:
      - fuel-net

volumes:
  fuel-pg-data:
  fuel-redis-data:

networks:
  fuel-net:
    driver: bridge